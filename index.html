<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2383e2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Finance">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>My Finance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f7f7f5;--surface:#fff;--border:#e9e9e7;--hover:#f1f1ef;
  --text:#1a1a1a;--muted:#8a8a8a;--subtle:#e0e0de;
  --accent:#2383e2;--green:#0f7b6c;--red:#e03e3e;
  --shadow:0 1px 3px rgba(0,0,0,.07);--page-icon:#b0b0b0;
}
[data-theme="dark"]{
  --bg:#191919;--surface:#252525;--border:#333;--hover:#2f2f2f;
  --text:#e8e8e6;--muted:#7a7a7a;--subtle:#3a3a3a;
  --accent:#4a9edd;--green:#2aad92;--red:#e05555;
  --shadow:0 1px 3px rgba(0,0,0,.35);--page-icon:#666;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px;line-height:1.5;transition:background .2s,color .2s;}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:300;}
.nav-brand{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.nav-brand em{font-style:normal;color:var(--accent);}
.nav-tabs{display:flex;gap:1px;}
.tab{background:none;border:none;color:var(--muted);font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:500;font-family:inherit;transition:all .12s;}
.tab:hover{color:var(--text);background:var(--hover);}
.tab.active{color:var(--text);background:var(--hover);font-weight:700;}
.tbtn{width:32px;height:32px;border-radius:7px;cursor:pointer;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .12s;}
.tbtn:hover{background:var(--hover);}

/* VIEWS */
.view{display:none;padding:28px 28px;max-width:1060px;margin:0 auto;}
.view.active{display:block;}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.st{font-size:22px;font-weight:700;letter-spacing:-.5px;}

/* ── HERO BALANCE CARD ── */
.hero-card{
  background:var(--surface);
  border:2px solid var(--accent);
  border-radius:16px;
  padding:26px 28px 22px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  display:flex;align-items:flex-end;justify-content:space-between;gap:20px;
}
[data-theme="dark"] .hero-card{background:rgba(74,158,221,.06);}
.hero-left{flex:1;min-width:0;}
.hero-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.hero-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.hero-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);}
.hero-date{font-size:11px;color:var(--muted);margin-left:4px;}
.now-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;padding:2px 9px;border-radius:20px;letter-spacing:.4px;}
.hero-bal-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.hero-bal{font-size:46px;font-weight:700;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums;}
.now-inp{
  background:transparent;border:none;
  color:var(--text);font-size:46px;font-weight:700;letter-spacing:-2px;
  width:280px;font-family:inherit;padding:0 0 2px;font-variant-numeric:tabular-nums;
}
.now-inp:focus{outline:none;}
.edit-pencil{display:flex;align-items:center;color:var(--accent);opacity:.7;flex-shrink:0;margin-bottom:4px;cursor:text;}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;}
.hero-stat{padding:0 20px 0 0;margin-right:20px;border-right:1px solid var(--border);}
.hero-stat:last-child{border-right:none;padding-right:0;margin-right:0;}
.hs-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:3px;}
.hs-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
.hs-blue{color:var(--accent);}
.hs-red{color:var(--red);}
.hs-green{color:var(--green);}

/* sparkline */
.sparkline{display:flex;align-items:flex-end;gap:4px;height:54px;flex-shrink:0;opacity:.45;}
.spark-bar{width:8px;border-radius:3px 3px 0 0;background:var(--accent);}

/* ── PROJECTION CARDS ── */
.proj-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 20px 16px;cursor:pointer;transition:border-color .15s,transform .12s,box-shadow .15s;box-shadow:var(--shadow);}
.pcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 5px 16px rgba(35,131,226,.13);}
.pcard:hover .pc-label{color:var(--accent);}
.pc-date{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:2px;}
.pc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;transition:color .15s;}
.pc-bal{font-size:28px;font-weight:700;letter-spacing:-.8px;font-variant-numeric:tabular-nums;margin-bottom:8px;}
.pc-delta{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;}
.pc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dpos{color:var(--green);} .pc-dot-pos{background:var(--green);}
.dneg{color:var(--red);}   .pc-dot-neg{background:var(--red);}

/* EXTRA INCOME */
.extra-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
.extra-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.extra-hdr-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.extra-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px;}
.extra-row:last-child{border-bottom:none;}
.xrow-l{display:flex;align-items:center;gap:10px;flex:1;}
.xrow-amt{font-size:13px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;}
.empty-x{padding:14px 16px;font-size:13px;color:var(--muted);}
.xadd-row{display:flex;gap:8px;align-items:center;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
.xadd-row input,.xadd-row select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px;font-family:inherit;}
.xadd-row input:focus,.xadd-row select:focus{outline:none;border-color:var(--accent);}

/* SAL BAR */
.sal-bar{display:flex;align-items:center;gap:18px;margin-bottom:14px;padding:10px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap;box-shadow:var(--shadow);}
.sal-grp{display:flex;align-items:center;gap:8px;}
.sal-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.sal-inp{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:15px;font-weight:700;width:150px;font-family:inherit;font-variant-numeric:tabular-nums;}
.sal-inp:focus{outline:none;border-color:var(--accent);}
.vdiv{width:1px;height:24px;background:var(--border);}
.bal-tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.tp{background:rgba(15,123,108,.1);color:var(--green);} .tn{background:rgba(224,62,62,.1);color:var(--red);}

/* ══ NOTION TABLE ══ */
.ntbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:visible;margin-bottom:6px;box-shadow:var(--shadow);}
.ntbl-toolbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border);border-radius:10px 10px 0 0;}
.ntbl-title{font-size:13px;font-weight:700;}
.ntbl-tools{display:flex;gap:6px;align-items:center;}
.ntbl-head{display:grid;grid-template-columns:28px 2fr 110px 150px 1fr;border-bottom:1px solid var(--border);background:var(--bg);}
.nth{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;display:flex;align-items:center;gap:4px;border-right:1px solid var(--border);}
.nth:first-child{border-right:1px solid var(--border);padding:7px 4px;}
.nth:last-child{border-right:none;}

/* rows */
.nrow{display:grid;grid-template-columns:28px 2fr 110px 150px 1fr;border-bottom:1px solid var(--border);transition:background .08s;position:relative;}
.nrow:last-child{border-bottom:none;}
.nrow:hover{background:var(--hover);}
.nrow.income-row .nc-name{border-left:3px solid var(--green);}

/* delete zone */
.nc-del{display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);cursor:pointer;}
.del-ico{opacity:0;color:var(--muted);font-size:12px;line-height:1;padding:3px;border-radius:4px;transition:opacity .1s,color .1s;}
.nrow:hover .del-ico{opacity:1;}
.del-ico:hover{color:var(--red);background:rgba(224,62,62,.1);}

/* cells */
.nc-name{padding:7px 8px 7px 8px;display:flex;align-items:center;gap:7px;border-right:1px solid var(--border);min-width:0;overflow:hidden;cursor:text;}
.pgico{color:var(--page-icon);font-size:13px;flex-shrink:0;}
.nname{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nc-amt{padding:7px 10px 7px 6px;display:flex;align-items:center;justify-content:flex-end;border-right:1px solid var(--border);font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;cursor:text;}
.nc-amt.zero{color:var(--muted);font-weight:400;}
.nc-amt.income{color:var(--green);}
.nc-cat{padding:5px 8px;display:flex;align-items:center;border-right:1px solid var(--border);cursor:pointer;min-height:36px;}
.nc-cmt{padding:7px 10px;display:flex;align-items:center;border-right:none;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:text;flex:1;}
.nc-cmt.has-val{color:var(--text);}

/* active cell input */
.cell-inp{width:100%;height:100%;background:rgba(35,131,226,.05);border:none;border-bottom:2px solid var(--accent);color:var(--text);padding:7px 8px;font-size:14px;font-family:inherit;font-weight:700;}
.cell-inp:focus{outline:none;background:rgba(35,131,226,.09);}
.cell-inp.name-inp{font-weight:500;}
.cell-inp.amt-inp{text-align:right;}
.cell-inp.cmt-inp{font-size:12px;font-weight:400;}

/* category dropdown — Notion style */
.cat-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;}
.cat-display{width:100%;height:100%;display:flex;align-items:center;padding:5px 8px;cursor:pointer;min-height:34px;}
.cat-drop{display:none;position:absolute;top:calc(100% + 2px);left:0;width:210px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 26px rgba(0,0,0,.16);z-index:600;overflow:hidden;}
.cat-drop.open{display:block;}
.cat-search-wrap{padding:8px 10px;border-bottom:1px solid var(--border);}
.cat-search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-size:12px;font-family:inherit;}
.cat-search:focus{outline:none;border-color:var(--accent);}
.cat-sub{padding:5px 12px 4px;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px;}
.cat-opts{padding:2px 0 6px;}
.cat-opt{padding:7px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background .07s;}
.cat-opt:hover{background:var(--hover);}
.cat-opt.sel{background:var(--accent);}
.cat-opt.sel .badge{background:rgba(255,255,255,.25)!important;color:#fff!important;}
.cat-drag{color:var(--subtle);font-size:11px;letter-spacing:-1px;flex-shrink:0;}

/* new-row / sum */
.ntbl-new-row{display:flex;align-items:center;gap:6px;padding:7px 12px;color:var(--muted);cursor:pointer;font-size:13px;transition:background .08s;}
.ntbl-new-row:hover{background:var(--hover);color:var(--text);}
.ntbl-footer-btns{display:flex;border-top:1px solid var(--border);}
.ntbl-footer-btns .ntbl-new-row{flex:1;border-right:1px solid var(--border);}
.ntbl-footer-btns .ntbl-new-row:last-child{border-right:none;}
.sum-row{display:flex;justify-content:flex-end;align-items:center;gap:14px;padding:9px 16px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);}
.sum-lbl{font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-size:10px;}
.sum-val{font-weight:700;font-size:14px;color:var(--text);font-variant-numeric:tabular-nums;}

/* quick-add */
.qadd-wrap{border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;background:var(--surface);overflow:hidden;}
.qadd-row{display:grid;grid-template-columns:28px 2fr 110px 150px 1fr;}
.qac{padding:0;border-right:1px solid var(--border);}
.qac:last-child{border-right:none;}
.qai{width:100%;height:100%;padding:8px 10px;background:transparent;border:none;color:var(--text);font-size:14px;font-family:inherit;}
.qai:focus{outline:none;background:rgba(35,131,226,.04);}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:4px;font-weight:600;white-space:nowrap;}
.bHome{background:rgba(15,123,108,.1);color:#0f7b6c;}
.bFood{background:rgba(217,115,13,.12);color:#c05c00;}
.bBeauty{background:rgba(168,85,247,.1);color:#7c3aed;}
.bEntertainment{background:rgba(35,131,226,.1);color:#1a6db8;}
.bHealth{background:rgba(224,62,62,.1);color:#c0392b;}
.bTransport{background:rgba(100,71,171,.1);color:#5b3fa0;}
.bEducation{background:rgba(203,145,47,.15);color:#9e6c00;}
.bSavings{background:rgba(79,70,229,.1);color:#4338ca;}
.bOther{background:rgba(138,138,138,.1);color:#6b7280;}
.bIncome{background:rgba(15,123,108,.12);color:#0f7b6c;}

/* DUPLICATE PANEL */
.dup-panel{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;display:none;box-shadow:var(--shadow);}
.dup-panel.open{display:block;}
.dup-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.dup-cats{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.dup-cat{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .12s;font-size:12px;font-weight:600;user-select:none;}
.dup-cat:hover{border-color:var(--accent);}
.dup-cat.on{border-color:var(--accent);background:rgba(35,131,226,.07);}
.dup-ck{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--subtle);display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;line-height:1;}
.dup-cat.on .dup-ck{background:var(--accent);border-color:var(--accent);color:#fff;}
.dup-footer{display:flex;gap:8px;justify-content:flex-end;}

/* SAVINGS */
.sav-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start;}
.donut-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:var(--shadow);}
.donut-wrap{position:relative;width:170px;height:170px;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.donut-total{font-size:17px;font-weight:700;letter-spacing:-.4px;font-variant-numeric:tabular-nums;}
.donut-lbl{font-size:10px;color:var(--muted);margin-top:1px;}
.sav-list-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.sav-list-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);}
.sav-list-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.sav-row{border-bottom:1px solid var(--border);}
.sav-row:last-child{border-bottom:none;}
.sav-row-main{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;}
.sav-row-main:hover{background:var(--hover);}
.sav-row-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.sdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.sav-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sav-row-r{display:flex;align-items:center;gap:8px;}
.sav-amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
.edit-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:5px;line-height:1;font-family:inherit;transition:color .12s,background .12s;}
.edit-toggle:hover,.edit-toggle.active{color:var(--accent);}
.sav-edit-panel{padding:14px 16px;border-top:1px solid var(--border);background:rgba(35,131,226,.025);display:none;}
.sav-edit-panel.open{display:block;}
.ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.ep-field{display:flex;flex-direction:column;gap:4px;}
.ep-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.ep-inp{padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;width:100%;}
.ep-inp:focus{outline:none;border-color:var(--accent);}
.ep-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ep-sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.ep-sw:hover{transform:scale(1.2);}
.ep-sw.sel{outline:2px solid var(--accent);outline-offset:2px;}
.ep-footer{display:flex;gap:8px;justify-content:flex-end;}
.sav-add-form{border-bottom:1px solid var(--border);background:rgba(35,131,226,.025);display:none;}
.sav-add-form.open{display:block;}
.sav-add-inner{padding:14px 16px;}

/* extra breakdown inside hero */
.hero-no-extra .now-inp{font-size:46px;letter-spacing:-2px;}
.bal-without{font-size:22px;font-weight:700;letter-spacing:-.8px;color:var(--muted);font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:2px;}
.bal-without-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:3px;}
.now-inp-sm{background:transparent;border:none;color:var(--muted);font-size:22px;font-weight:700;letter-spacing:-.8px;width:200px;font-family:inherit;padding:0;font-variant-numeric:tabular-nums;}
.now-inp-sm:focus{outline:none;}
.extra-breakdown{margin:10px 0;display:flex;flex-direction:column;gap:0;}
.xb-divider{height:0.5px;background:var(--border);margin:8px 0;}
.xb-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px;color:var(--muted);}
.xb-plus{color:var(--green);font-weight:700;font-size:13px;}
.xb-name{flex:1;}
.xb-amt{font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;}
.bal-with-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:3px;}
.bal-with{font-size:46px;font-weight:700;letter-spacing:-2px;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .12s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{filter:brightness(1.08);}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{color:var(--text);background:var(--hover);}
.btn-d{background:transparent;color:var(--red);border:1px solid transparent;padding:5px 10px;}
.btn-d:hover{background:rgba(224,62,62,.08);border-color:rgba(224,62,62,.2);}

════════════════════════════════════ */

<script>
// ── DATA ──────────────────────────────────────────────────
const DEF={
  salary:13800,currentMoney:16000,extraIncome:[],template:[],
  expenses:{
    "2026-05":[
      {id:"e1", name:"House rate",          amount:5300,  cat:"Home",         comment:"",type:"expense"},
      {id:"e2", name:"House billing",       amount:658.5, cat:"Home",         comment:"",type:"expense"},
      {id:"e3", name:"Beautician",          amount:200,   cat:"Beauty",       comment:"",type:"expense"},
      {id:"e4", name:"Gas",                 amount:250,   cat:"Transport",    comment:"",type:"expense"},
      {id:"e5", name:"Partner",             amount:90,    cat:"Other",        comment:"",type:"expense"},
      {id:"e6", name:"Internet",            amount:125,   cat:"Other",        comment:"",type:"expense"},
      {id:"e7", name:"Crossfit",            amount:750,   cat:"Entertainment",comment:"",type:"expense"},
      {id:"e8", name:"Food expenses",       amount:800,   cat:"Food",         comment:"",type:"expense"},
      {id:"e9", name:"Restaurant",          amount:0,     cat:"Food",         comment:"",type:"expense"},
      {id:"e10",name:"General",             amount:1800,  cat:"Other",        comment:"דו\"ח קורונה + ביטוח + חידוש רישיון",type:"expense"},
      {id:"e11",name:"Clothes",             amount:0,     cat:"Other",        comment:"",type:"expense"},
      {id:"e12",name:"English lessons",     amount:260,   cat:"Education",    comment:"",type:"expense"},
      {id:"e13",name:"Saving",              amount:1500,  cat:"Savings",      comment:"",type:"expense"},
      {id:"e14",name:"ביטוח בריאות",        amount:250,   cat:"Health",       comment:"",type:"expense"},
      {id:"e15",name:"Chat GPT",            amount:85,    cat:"Other",        comment:"",type:"expense"},
      {id:"e16",name:"Stocks",              amount:0,     cat:"Savings",      comment:"",type:"expense"},
      {id:"e17",name:"Long Term investment",amount:500,   cat:"Savings",      comment:"",type:"expense"}
    ]
  },
  assets:[
    {id:1,name:"Pension Fund (Migdal)",    amount:267780,color:"#1e3a8a"},
    {id:2,name:"Education Fund (Phoenix)", amount:56129, color:"#1d4ed8"},
    {id:3,name:"Investment Fund (Gemel)",  amount:9320,  color:"#60a5fa"},
    {id:4,name:"Savings Policy",           amount:1313,  color:"#bfdbfe"}
  ]
};

let D,expM,qaddOpen=false,qaddType='expense',dupCatsSet,editAssetId=null,savChart=null;
const CATS=['Home','Food','Beauty','Entertainment','Health','Transport','Education','Savings','Other'];
const SWS=['#1e3a8a','#1d4ed8','#2563eb','#3b82f6','#60a5fa','#93c5fd','#bfdbfe',
           '#0f766e','#0d9488','#14b8a6','#7c3aed','#9333ea','#a855f7',
           '#be185d','#db2777','#b45309','#d97706','#374151','#6b7280'];

function load(){
  try{const s=localStorage.getItem('mf10');D=s?JSON.parse(s):deep(DEF);if(!D.extraIncome)D.extraIncome=[];if(!D.template)D.template=[];}
  catch(e){D=deep(DEF);}
}
function sv(){localStorage.setItem('mf10',JSON.stringify(D));}
function deep(o){return JSON.parse(JSON.stringify(o));}

// ── FORMAT ────────────────────────────────────────────────
function numFmt(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function f(n){return '₪'+numFmt(n);}
function fd(n){const v=Math.round(n||0);return(v>=0?'+':'')+f(Math.abs(v));}
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtM(ym){const[y,m]=ym.split('-');return MO[+m-1]+' '+y;}
function fmtMo(ym){const[y,m]=ym.split('-');return MO[+m-1].slice(0,3);}
function dotM(ym){return'10.'+String(+ym.split('-')[1]);}
function prevM(ym){const[y,m]=ym.split('-').map(Number);return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;}
function nextM(ym){const[y,m]=ym.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
function nowYM(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function exps(ym){return D.expenses[ym]||[];}
function expenseTotal(ym){return exps(ym).filter(e=>e.type!=='income').reduce((s,e)=>s+(+e.amount||0),0);}
function incomeTotal(ym){return exps(ym).filter(e=>e.type==='income').reduce((s,e)=>s+(+e.amount||0),0);}
// Saving = the specific row named "Saving" (case-insensitive) in the month
function savingForMonth(ym){
  let m=ym;
  for(let i=0;i<12;i++){
    const l=D.expenses[m];
    if(l&&l.length){
      const row=l.find(e=>e.type!=='income'&&e.name.trim().toLowerCase()==='saving');
      return row?+row.amount||0:0;
    }
    m=prevM(m);
  }
  return 0;
}
function dk(){return document.documentElement.getAttribute('data-theme')==='dark';}

function totForCalc(ym){
  let m=ym;
  for(let i=0;i<12;i++){
    const l=D.expenses[m];
    if(l&&l.length){
      const exp=l.filter(e=>e.type!=='income').reduce((s,e)=>s+(+e.amount||0),0);
      const inc=l.filter(e=>e.type==='income').reduce((s,e)=>s+(+e.amount||0),0);
      return exp-inc;
    }
    m=prevM(m);
  }
  return 0;
}

function autoFill(ym){
  if(D.expenses[ym]&&D.expenses[ym].length)return;
  // Scan backwards up to 24 months to find the most recent month with data
  let m=prevM(ym);
  for(let i=0;i<24;i++){
    const src=D.expenses[m];
    if(src&&src.length){
      D.expenses[ym]=src.map(e=>({...e,id:'e'+Date.now()+(Math.random()*999|0)}));
      sv();
      return;
    }
    m=prevM(m);
  }
}

// ── NAV ───────────────────────────────────────────────────
function showView(n){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');
  document.querySelectorAll('.tab')[{overview:0,expenses:1,savings:2}[n]].classList.add('active');
  if(n==='overview')renderOv();
  if(n==='expenses')renderEx();
  if(n==='savings') renderSav();
}
function goMonth(ym){expM=ym;autoFill(ym);showView('expenses');}
function toggleTheme(){
  const d=!dk();
  document.documentElement.setAttribute('data-theme',d?'dark':'light');
  document.getElementById('tbtn').textContent=d?'🌙':'☀️';
  localStorage.setItem('mf10_t',d?'dark':'light');
  if(document.querySelector('.view.active').id==='view-savings')renderSav();
}

// Lightweight overview refresh — called when expenses change
// Updates projection cards + stats without disrupting the balance input
function refreshOvCards(){
  const p=calcOv();
  const cards=document.querySelectorAll('.pcard');
  if(cards[0]){
    cards[0].querySelector('.pc-bal').textContent=f(p.bal1);
    cards[0].querySelector('.pc-delta').innerHTML=
      `<div class="pc-dot ${p.delta>=0?'pc-dot-pos':'pc-dot-neg'}"></div>
       <span class="${p.delta>=0?'dpos':'dneg'}">${fd(p.delta)} / mo</span>`;
  }
  if(cards[1]){
    cards[1].querySelector('.pc-bal').textContent=f(p.bal6);
    cards[1].querySelector('.pc-delta').innerHTML=
      `<div class="pc-dot ${p.tot6>=0?'pc-dot-pos':'pc-dot-neg'}"></div>
       <span class="${p.tot6>=0?'dpos':'dneg'}">${fd(p.tot6)} total</span>`;
  }
  const stats=document.getElementById('hero-stats');
  if(stats){
    const sv=stats.querySelectorAll('.hs-val');
    if(sv[1])sv[1].textContent='−'+f(p.exp1);
    if(sv[2]){sv[2].textContent=f(p.delta);sv[2].className='hs-val '+(p.delta>=0?'hs-green':'hs-red');}
  }
}

// ── OVERVIEW ──────────────────────────────────────────────
function calcOv(){
  const now=nowYM(),sal=+D.salary||0;
  // Extra income is ONE-TIME — added to base balance, not repeated each month
  const xtra=(D.extraIncome||[]).reduce((s,e)=>s+(+e.amount||0),0);
  const cur=+D.currentMoney||0;
  const base=cur+xtra;  // effective starting balance
  const saving1=savingForMonth(now);
  const bal1=base+saving1;
  let bal6=base,m=now;
  for(let i=0;i<6;i++){bal6+=savingForMonth(m);m=nextM(m);}
  const exp1=expenseTotal(now);
  return{now,cur,base,sal,exp1,xtra,delta:saving1,bal1,bal6,tot6:bal6-base,nm:nextM(now),m6:m};
}

function renderOv(){
  const p=calcOv();
  const now=nowYM();
  const[y]=now.split('-');
  document.getElementById('hero-date').textContent=`${dotM(now)}.${y}`;

  // ── Balance area ──
  const extras=D.extraIncome||[];
  const area=document.getElementById('hero-bal-area');
  if(extras.length===0){
    // No extra — single large editable input
    area.innerHTML=`<div style="margin-bottom:14px">
      <input class="now-inp" id="cur-inp" type="text"
        onfocus="this.value=D.currentMoney||'';this.type='number';"
        onblur="this.type='text';this.value=D.currentMoney?numFmt(D.currentMoney):'';"
        oninput="onCurMoney()" value="${numFmt(Math.round(p.cur))}" />
    </div>`;
  } else {
    // Has extras — show breakdown
    const xRows=extras.map(e=>`
      <div class="xb-row">
        <span class="xb-plus">+</span>
        <span class="xb-name">${e.name}</span>
        <span class="xb-amt">+${f(e.amount)}</span>
      </div>`).join('');
    area.innerHTML=`<div style="margin-bottom:14px">
      <div class="bal-without-lbl">Without extra</div>
      <input class="now-inp-sm" id="cur-inp" type="text"
        onfocus="this.value=D.currentMoney||'';this.type='number';"
        onblur="this.type='text';this.value=D.currentMoney?numFmt(D.currentMoney):'';"
        oninput="onCurMoney()" value="${numFmt(Math.round(p.cur))}" />
      <div class="extra-breakdown">
        <div class="xb-divider"></div>
        ${xRows}
        <div class="xb-divider"></div>
      </div>
      <div class="bal-with-lbl">With extra</div>
      <div class="bal-with" id="bal-with-val">${f(p.base)}</div>
    </div>`;
  }

  // ── Stats ──
  document.getElementById('hero-stats').innerHTML=`
    <div class="hero-stat">
      <div class="hs-lbl">Salary</div>
      <div class="hs-val hs-blue">${f(p.sal)}</div>
    </div>
    <div class="hero-stat">
      <div class="hs-lbl">Expenses</div>
      <div class="hs-val hs-red">−${f(p.exp1)}</div>
    </div>
    <div class="hero-stat">
      <div class="hs-lbl">Monthly saving</div>
      <div class="hs-val ${p.delta>=0?'hs-green':'hs-red'}">${f(p.delta)}</div>
    </div>`;

  // ── Sparkline ──
  let vals=[],bv=p.base,mm=now;
  for(let i=0;i<6;i++){bv+=savingForMonth(mm);vals.push(bv);mm=nextM(mm);}
  const mx=Math.max(...vals,1);
  document.getElementById('sparkline').innerHTML=vals.map((v,i)=>{
    const h=Math.max(12,Math.round((v/mx)*54));
    return`<div class="spark-bar" style="height:${h}px;opacity:${.5+i*.1}"></div>`;
  }).join('');

  // ── Projection cards ──
  document.getElementById('proj-row').innerHTML=`
    <div class="pcard" onclick="goMonth('${p.nm}')">
      <div class="pc-date">${dotM(p.nm)}</div>
      <div class="pc-label">Next month</div>

// category dropdown — Notion style with search
function buildCatDrop(sel,pfx,forIncome){
  const optCats=forIncome?CATS:[''].concat(CATS);
  const display=sel
    ?`<span class="badge b${sel.replace(/\s/g,'')}">${sel}</span>`
    :`<span style="color:var(--muted);font-size:12px">—</span>`;
  const opts=optCats.map(c=>{
    const b=c?`<span class="badge b${c.replace(/\s/g,'')}">${c}</span>`
            :`<span style="color:var(--muted);font-size:12px;font-style:italic">No category</span>`;
    return`<div class="cat-opt ${c===sel?'sel':''}" data-val="${c}" onclick="pickCat('${pfx}','${c}',this)">
      <span class="cat-drag">⋮⋮</span>${b}
    </div>`;
  }).join('');
  return`<div class="cat-wrap" id="cw-${pfx}">
    <div class="cat-display" onclick="toggleCatDrop('${pfx}',event)">${display}</div>
    <input type="hidden" id="cv-${pfx}" value="${sel||''}"/>
    <div class="cat-drop" id="cdrop-${pfx}">
      <div class="cat-search-wrap">
        <input class="cat-search" id="cs-${pfx}" placeholder="Search for an option..." oninput="filterCats('${pfx}',this.value)" onclick="event.stopPropagation()"/>
      </div>
      <div class="cat-sub">Select an option or create one</div>
      <div class="cat-opts" id="co-${pfx}">${opts}</div>
    </div>
  </div>`;
}
function toggleCatDrop(pfx,e){
  e&&e.stopPropagation();
  const d=document.getElementById('cdrop-'+pfx);
  const was=d.classList.contains('open');
  document.querySelectorAll('.cat-drop.open').forEach(x=>x.classList.remove('open'));
  if(!was){d.classList.add('open');setTimeout(()=>{const s=document.getElementById('cs-'+pfx);if(s)s.focus();},30);}
}
function filterCats(pfx,q){
  const opts=document.querySelectorAll(`#co-${pfx} .cat-opt`);
  const lq=q.toLowerCase();
  opts.forEach(o=>{
    const val=o.getAttribute('data-val').toLowerCase();
    o.style.display=(val.includes(lq)||q==='')? '':'none';
  });
}
function pickCat(pfx,val,el){
  const hid=document.getElementById('cv-'+pfx);if(!hid)return;
  hid.value=val;
  const b=val?`<span class="badge b${val.replace(/\s/g,'')}">${val}</span>`
            :`<span style="color:var(--muted);font-size:12px">—</span>`;
  el.closest('.cat-wrap').querySelector('.cat-display').innerHTML=b;
  el.closest('.cat-drop').querySelectorAll('.cat-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  el.closest('.cat-drop').classList.remove('open');
  // if inside a real row, save immediately
  if(pfx.startsWith('r')){
    const id=pfx.slice(1);
    const l=D.expenses[expM],i=l.findIndex(e=>String(e.id)===id);
    if(i>=0){l[i].cat=val;sv();updateSumRow();refreshOvCards();}
  }
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.cat-wrap'))document.querySelectorAll('.cat-drop.open').forEach(x=>x.classList.remove('open'));

});

// ── CELL-LEVEL EDITING ────────────────────────────────────
let activeCell=null; // {id,field}

function activateCell(id,field,ev){
  ev&&ev.stopPropagation();
  // Re-clicking the same cell — ignore
  if(activeCell&&activeCell.id===id&&activeCell.field===field)return;
  // Save + restore previous cell before opening new one
  if(activeCell){
    const {id:pid,field:pfield}=activeCell;
    const pel=document.getElementById(`cell-${pid}-${pfield}`);
    if(pel&&pfield!=='cat'){
      const l=D.expenses[expM],i=l.findIndex(e=>String(e.id)===pid);
      if(i>=0){
        if(pfield==='name')    l[i].name   =pel.value.trim()||l[i].name;
        if(pfield==='amount')  l[i].amount =parseFloat(pel.value)||0;
        if(pfield==='comment') l[i].comment=pel.value.trim();
        sv();
      }
    }
    // Clear BEFORE restoring DOM so blur handler on old input does nothing
    activeCell=null;
    restoreCell(pid,pfield);
  }
  activeCell={id,field};
  const row=document.querySelector(`.nrow[data-id="${id}"]`);
  if(!row){activeCell=null;return;}
  const e=exps(expM).find(x=>String(x.id)===id);
  if(!e){activeCell=null;return;}
  if(field==='name'){
    row.querySelector('.nc-name').innerHTML=
      `<span class="pgico">${e.type==='income'?'💰':'📄'}</span>
       <input class="cell-inp name-inp" id="cell-${id}-name" value="${e.name}"
         onblur="blurCell('${id}','name')" onkeydown="cellKey(event,'${id}','name')"/>`;
    setTimeout(()=>{const el=document.getElementById(`cell-${id}-name`);if(el){el.focus();el.select();}},10);
  } else if(field==='amount'){
    row.querySelector('.nc-amt').innerHTML=
      `<input class="cell-inp amt-inp" id="cell-${id}-amount" type="number"
         value="${e.amount||''}"
         onblur="blurCell('${id}','amount')" onkeydown="cellKey(event,'${id}','amount')"/>`;
    setTimeout(()=>{const el=document.getElementById(`cell-${id}-amount`);if(el){el.focus();el.select();}},10);
  } else if(field==='comment'){
    row.querySelector('.nc-cmt').innerHTML=
      `<input class="cell-inp cmt-inp" id="cell-${id}-comment" value="${e.comment||''}"
         placeholder="Add a comment…"
         onblur="blurCell('${id}','comment')" onkeydown="cellKey(event,'${id}','comment')"/>`;
    setTimeout(()=>{const el=document.getElementById(`cell-${id}-comment`);if(el)el.focus();},10);
  } else if(field==='cat'){
    row.querySelector('.nc-cat').innerHTML=buildCatDrop(e.cat,'r'+id,e.type==='income');
    setTimeout(()=>toggleCatDrop('r'+id,null),10);
  }
}

// Only commits when THIS cell is still active — prevents blur/click race
function blurCell(id,field){
  if(!activeCell||activeCell.id!==id||activeCell.field!==field)return;
  commitCell(true);
}

function commitCell(doSave){
  if(!activeCell)return;
  const {id,field}=activeCell;
  if(doSave&&field!=='cat'){
    const el=document.getElementById(`cell-${id}-${field}`);
    if(el){
      const l=D.expenses[expM],i=l.findIndex(e=>String(e.id)===id);
      if(i>=0){
        if(field==='name')    l[i].name   =el.value.trim()||l[i].name;
        if(field==='amount')  l[i].amount =parseFloat(el.value)||0;
        if(field==='comment') l[i].comment=el.value.trim();
        sv();refreshOvCards();
      }
    }
  }
  activeCell=null;
  restoreCell(id,field);
  updateSumRow();
}

function restoreCell(id,field){
  const e=exps(expM).find(x=>String(x.id)===id);
  if(!e){renderEx();return;}
  const row=document.querySelector(`.nrow[data-id="${id}"]`);
  if(!row){renderEx();return;}
  if(field==='name'){
    row.querySelector('.nc-name').innerHTML=
      `<span class="pgico">${e.type==='income'?'💰':'📄'}</span><span class="nname">${e.name}</span>`;
  } else if(field==='amount'){
    const zero=!e.amount||+e.amount===0;
    const cell=row.querySelector('.nc-amt');
    cell.className=`nc-amt${zero?' zero':''}${e.type==='income'?' income':''}`;
    cell.textContent=zero?'':(e.type==='income'?'+':'')+numFmt(e.amount);
  } else if(field==='comment'){
    const cell=row.querySelector('.nc-cmt');
    cell.className='nc-cmt'+(e.comment?' has-val':'');
    cell.textContent=e.comment||'';
  } else if(field==='cat'){
    const cell=row.querySelector('.nc-cat');
    cell.innerHTML=e.type==='income'
      ?`<span class="badge bIncome">Income</span>`
      :e.cat?`<span class="badge b${e.cat.replace(/\s/g,'')}">${e.cat}</span>`:'';
  }
}

function cellKey(ev,id,field){
  if(ev.key==='Enter'){ev.preventDefault();commitCell(true);}
  if(ev.key==='Tab')  {ev.preventDefault();commitCell(true);}
  if(ev.key==='Escape'){activeCell=null;restoreCell(id,field);}
}

function buildRow(e){
  const isIncome=e.type==='income';
  const catCls=e.cat?'b'+e.cat.replace(/\s/g,''):'';
  const comment=e.comment||'';
  const zero=!e.amount||+e.amount===0;
  const id=String(e.id);
  return`<div class="nrow ${isIncome?'income-row':''}" data-id="${id}">
    <div class="nc-del" onclick="delExp('${id}')">
      <span class="del-ico">✕</span>
    </div>
    <div class="nc-name" onclick="activateCell('${id}','name',event)">
      <span class="pgico">${isIncome?'💰':'📄'}</span>
      <span class="nname">${e.name}</span>
    </div>
    <div class="nc-amt ${zero?'zero':''} ${isIncome?'income':''}" onclick="activateCell('${id}','amount',event)">
      ${zero?'':(isIncome?'+':'')+numFmt(e.amount)}
    </div>
    <div class="nc-cat" onclick="activateCell('${id}','cat',event)">
      ${isIncome
        ?`<span class="badge bIncome">Income</span>`
        :e.cat?`<span class="badge ${catCls}">${e.cat}</span>`
              :`<span style="color:var(--muted);font-size:11px">—</span>`}
    </div>
    <div class="nc-cmt ${comment?'has-val':''}" onclick="activateCell('${id}','comment',event)">
      ${comment}
    </div>
  </div>`;
}

function delExp(id){
  if(activeCell&&activeCell.id===id)activeCell=null;
  D.expenses[expM]=(D.expenses[expM]||[]).filter(e=>String(e.id)!==id);
  sv();renderEx();refreshOvCards();
}

function updateSumRow(){
  const expTot=expenseTotal(expM),incTot=incomeTotal(expM),netTot=expTot-incTot;
  // Update # column header with the total
  const hdr=document.getElementById('nth-total');
  if(hdr)hdr.innerHTML=`<span style="color:var(--muted);font-weight:700;font-size:10px;margin-right:4px">#</span><span style="color:var(--text);font-weight:700">${numFmt(netTot)}</span>`;
  // Notion-style SUM below table
  const row=document.getElementById('sum-row');
  if(!row)return;
  if(incTot>0){
    row.innerHTML=`<span style="margin-right:16px">Income&nbsp;<strong style="color:var(--green)">+${f(incTot)}</strong></span>`+
      `<span style="margin-right:16px">Expenses&nbsp;<strong>−${f(expTot)}</strong></span>`+
      `<span>SUM&nbsp;<strong style="color:var(--text)">${numFmt(netTot)}</strong></span>`;
  } else {
    row.innerHTML=`SUM&nbsp;<strong style="color:var(--text);font-size:13px">${numFmt(expTot)}</strong>`;
  }
}

// ── DUPLICATE ─────────────────────────────────────────────
let dupMode='month'; // 'month' | 'template'

function openDup(mode){
  dupMode=mode||'month';
  dupCatsSet=new Set(CATS);
  const src=mode==='template'?D.template:exps(expM).filter(e=>e.type!=='income');
  if(mode==='template'&&!src.length){
    alert('No template saved yet. Use "Save as template" first.');return;
  }
  const nm=nextM(expM);
  document.getElementById('dup-title').textContent=
    mode==='template'
      ?`Apply template to ${fmtM(expM)} — select categories`
      :`Duplicate to ${fmtM(nm)} — select categories`;
  // build category pills from whichever source
  const cats=[...new Set(src.map(e=>e.cat).filter(Boolean))];
  document.getElementById('dup-cats').innerHTML=cats.map(c=>`
    <div class="dup-cat on" id="dc-${c}" onclick="toggleDupCat('${c}')">
      <span class="dup-ck">✓</span>
      <span class="badge b${c.replace(/\s/g,'')}">${c}</span>
    </div>`).join('');
  document.getElementById('dup-panel').classList.add('open');
}
function closeDup(){document.getElementById('dup-panel').classList.remove('open');}
function toggleDupCat(c){
  const el=document.getElementById('dc-'+c);if(!el)return;
  if(dupCatsSet.has(c)){dupCatsSet.delete(c);el.classList.remove('on');el.querySelector('.dup-ck').textContent='';}
  else{dupCatsSet.add(c);el.classList.add('on');el.querySelector('.dup-ck').textContent='✓';}
}
function doDuplicate(){
  const src=dupMode==='template'
    ?D.template.filter(e=>dupCatsSet.has(e.cat))
    :exps(expM).filter(e=>e.type!=='income'&&dupCatsSet.has(e.cat));
  if(!src.length){closeDup();return;}
  const dest=dupMode==='template'?expM:nextM(expM);
  const existingIncome=(D.expenses[dest]||[]).filter(e=>e.type==='income');
  D.expenses[dest]=[
    ...src.map(e=>({...e,id:'e'+Date.now()+(Math.random()*9999|0),type:e.type||'expense'})),
    ...existingIncome
  ];
  sv();closeDup();
  if(dupMode!=='template')expM=dest;
  renderEx();
}
function saveTemplate(){
  const rows=exps(expM).filter(e=>e.type!=='income');
  if(!rows.length)return;
  D.template=rows.map(e=>({...e}));
  sv();
  const btn=document.getElementById('save-tmpl-btn');
  btn.textContent='★ Template saved';
  setTimeout(()=>{btn.textContent='☆ Save as template';},1800);
}

function toggleAssetEdit(id){

function pickAssetColor(id,c,el){
  el.closest('.ep-swatches').querySelectorAll('.ep-sw').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
  const a=D.assets.find(a=>a.id===id);if(a)a.color=c;
  document.getElementById('srow-'+id).querySelector('.sdot').style.background=c;
}
function saveAsset(id){
  const a=D.assets.find(a=>a.id===id);if(!a)return;
  a.name=document.getElementById('en-'+id).value.trim()||a.name;
  a.amount=parseFloat(document.getElementById('ea-'+id).value)||0;
  editAssetId=null;sv();renderSav();
}
function delAsset(id){D.assets=D.assets.filter(a=>a.id!==id);editAssetId=null;sv();renderSav();}
function openSavAdd(){
  const slot=document.getElementById('sav-add-slot');
  if(slot.querySelector('.sav-add-form.open')){slot.innerHTML='';return;}
  const pal=['#1e3a8a','#1d4ed8','#3b82f6','#60a5fa','#93c5fd','#7c3aed','#0d9488'];
  const sc=pal[D.assets.length%pal.length];
  slot.innerHTML=`<div class="sav-add-form open"><div class="sav-add-inner">
    <div class="ep-grid">
      <div class="ep-field"><label class="ep-lbl">Name</label><input class="ep-inp" id="new-aname" placeholder="e.g. Blink Investments"/></div>
      <div class="ep-field"><label class="ep-lbl">Balance (₪)</label><input class="ep-inp" id="new-aamt" type="number" placeholder="0"/></div>
    </div>
    <label class="ep-lbl" style="display:block;margin-bottom:6px">Color</label>
    <div class="ep-swatches" id="new-sw">
      ${SWS.map(c=>`<div class="ep-sw ${c===sc?'sel':''}" style="background:${c}" onclick="pickNewColor('${c}',this)"></div>`).join('')}
    </div>
    <div class="ep-footer">
      <button class="btn btn-g" onclick="document.getElementById('sav-add-slot').innerHTML=''">Cancel</button>
      <button class="btn btn-p" onclick="doAddAsset()">Add account</button>
    </div>
  </div></div>`;
  setTimeout(()=>document.getElementById('new-aname').focus(),20);
}
function pickNewColor(c,el){document.getElementById('new-sw').querySelectorAll('.ep-sw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
function doAddAsset(){
  const name=document.getElementById('new-aname').value.trim();
  const amount=parseFloat(document.getElementById('new-aamt').value)||0;
  const sel=document.querySelector('#new-sw .ep-sw.sel');
  if(!name)return;
  D.assets.push({id:Date.now(),name,amount,color:sel?sel.style.background:'#1d4ed8'});
  document.getElementById('sav-add-slot').innerHTML='';
  sv();renderSav();
}

load();
expM=nowYM();
autoFill(expM);
const _t=localStorage.getItem('mf10_t')||'light';
document.documentElement.setAttribute('data-theme',_t);
document.getElementById('tbtn').textContent=_t==='dark'?'🌙':'☀️';
renderOv();

// ── SERVICE WORKER ─────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
